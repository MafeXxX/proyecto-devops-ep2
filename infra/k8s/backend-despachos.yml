apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despachos
  namespace: proyecto-semestral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-despachos
  template:
    metadata:
      labels:
        app: backend-despachos
    spec:
      containers:
        - name: backend-despachos
          image: proyecto-semestral-back-despachos:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081

          env:
            - name: DB_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_ENDPOINT

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_NAME

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "700m"
              memory: "1Gi"

          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 70
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: backend-despachos-service
  namespace: proyecto-semestral
spec:
  type: ClusterIP
  selector:
    app: backend-despachos
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      