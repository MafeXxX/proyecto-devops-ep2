name: CI/CD proyecto-devops-ep2

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: proyecto-semestral
  BACKEND_PRIVATE_IP: 10.0.2.250
  MYSQL_PRIVATE_IP: 10.0.2.251

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push Frontend
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-frontend:latest \
            ./front_despacho

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-frontend:latest

      - name: Build y Push Backend Ventas
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-back-ventas:latest \
            ./back-Ventas_SpringBoot/Springboot-API-REST

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-back-ventas:latest

      - name: Build y Push Backend Despachos
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-back-despachos:latest \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-back-despachos:latest

      - name: Deploy automatico en EC2 Frontend y Backend privado
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}"
            export AWS_DEFAULT_REGION="us-east-1"

            echo "=== Preparando llave SSH temporal para backend privado ==="
            cat > /tmp/deploy_key.pem << 'KEYEOF'
            ${{ secrets.EC2_SSH_KEY }}
            KEYEOF
            chmod 600 /tmp/deploy_key.pem

            echo "=== Login ECR en Frontend EC2 ==="
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            echo "=== Deploy Backend en EC2 privada ==="
            ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key.pem ec2-user@${{ env.BACKEND_PRIVATE_IP }} "bash -s" << 'BACKEND_SCRIPT'
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}"
            export AWS_DEFAULT_REGION="us-east-1"

            echo "=== Verificando Docker en Backend ==="
            sudo systemctl start docker
            sudo docker --version
            sudo docker compose version

            echo "=== Login ECR Backend ==="
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            mkdir -p /home/ec2-user/proyecto-devops-ep2-backend
            cd /home/ec2-user/proyecto-devops-ep2-backend

            cat > docker-compose.yml << 'EOF'
            services:
              backend-ventas:
                image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto-semestral-back-ventas:latest
                container_name: backend_ventas
                restart: unless-stopped
                ports:
                  - "8080:8080"
                environment:
                  DB_ENDPOINT: 10.0.2.251
                  DB_PORT: 3306
                  DB_NAME: proyecto_db
                  DB_USERNAME: admin
                  DB_PASSWORD: admin123

              backend-despachos:
                image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto-semestral-back-despachos:latest
                container_name: backend_despachos
                restart: unless-stopped
                ports:
                  - "8081:8081"
                environment:
                  DB_ENDPOINT: 10.0.2.251
                  DB_PORT: 3306
                  DB_NAME: proyecto_db
                  DB_USERNAME: admin
                  DB_PASSWORD: admin123
            EOF

            echo "=== Pull backend ventas ==="
            timeout 120 sudo docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto-semestral-back-ventas:latest

            echo "=== Pull backend despachos ==="
            timeout 120 sudo docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto-semestral-back-despachos:latest

            echo "=== Reiniciando backends ==="
            timeout 120 sudo docker compose down --remove-orphans || true
            timeout 180 sudo docker compose up -d --remove-orphans

            sudo docker ps -a
            BACKEND_SCRIPT

            echo "=== Deploy Frontend en EC2 publica ==="
            mkdir -p /home/ec2-user/proyecto-devops-ep2-frontend
            cd /home/ec2-user/proyecto-devops-ep2-frontend

            cat > docker-compose.yml << 'EOF'
            services:
              frontend:
                image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto-semestral-frontend:latest
                container_name: frontend_app
                restart: unless-stopped
                ports:
                  - "80:80"
            EOF

            echo "=== Pull frontend ==="
            timeout 120 sudo docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto-semestral-frontend:latest

            echo "=== Reiniciando frontend ==="
            timeout 120 sudo docker compose down --remove-orphans || true
            timeout 180 sudo docker compose up -d --remove-orphans

            sudo docker ps -a

            echo "=== FIN DEPLOY ==="