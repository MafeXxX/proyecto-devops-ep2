name: CI/CD proyecto-devops-ep3

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: proyecto-semestral
  EKS_CLUSTER_NAME: proyecto-semestral-cluster
  NAMESPACE: proyecto-semestral
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v4

      - name: Definir URLs de imagenes ECR
        run: |
          echo "FRONTEND_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-frontend" >> $GITHUB_ENV
          echo "BACK_VENTAS_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-back-ventas" >> $GITHUB_ENV
          echo "BACK_DESPACHOS_IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}-back-despachos" >> $GITHUB_ENV

      - name: Build y Push Frontend
        run: |
          docker build --platform linux/amd64 \
            -t $FRONTEND_IMAGE:${{ env.IMAGE_TAG }} \
            -t $FRONTEND_IMAGE:latest \
            ./front_despacho

          docker push $FRONTEND_IMAGE:${{ env.IMAGE_TAG }}
          docker push $FRONTEND_IMAGE:latest

      - name: Build y Push Backend Ventas
        run: |
          docker build --platform linux/amd64 \
            -t $BACK_VENTAS_IMAGE:${{ env.IMAGE_TAG }} \
            -t $BACK_VENTAS_IMAGE:latest \
            ./back-Ventas_SpringBoot/Springboot-API-REST

          docker push $BACK_VENTAS_IMAGE:${{ env.IMAGE_TAG }}
          docker push $BACK_VENTAS_IMAGE:latest

      - name: Build y Push Backend Despachos
        run: |
          docker build --platform linux/amd64 \
            -t $BACK_DESPACHOS_IMAGE:${{ env.IMAGE_TAG }} \
            -t $BACK_DESPACHOS_IMAGE:latest \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

          docker push $BACK_DESPACHOS_IMAGE:${{ env.IMAGE_TAG }}
          docker push $BACK_DESPACHOS_IMAGE:latest

      - name: Conectar kubectl con EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

          kubectl get nodes

      - name: Aplicar Namespace
        run: |
          kubectl apply -f infra/k8s/namespace.yml

      - name: Aplicar Metrics Server
        run: |
          kubectl apply -f infra/k8s/metrics-server.yml

      - name: Esperar Metrics Server
        run: |
          kubectl rollout status deployment/metrics-server \
            -n kube-system \
            --timeout=3m

      - name: Aplicar MySQL Secret y MySQL
        run: |
          kubectl apply -f infra/k8s/secrets.yml
          kubectl apply -f infra/k8s/mysql.yml

      - name: Esperar MySQL
        run: |
          kubectl rollout status deployment/mysql \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m

      - name: Aplicar manifiestos de aplicacion
        run: |
          kubectl apply -f infra/k8s/backend-ventas.yml
          kubectl apply -f infra/k8s/backend-despachos.yml
          kubectl apply -f infra/k8s/frontend.yml
          kubectl apply -f infra/k8s/hpa.yml

      - name: Actualizar imagenes en EKS
        run: |
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_IMAGE:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

          kubectl set image deployment/backend-ventas \
            backend-ventas=$BACK_VENTAS_IMAGE:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

          kubectl set image deployment/backend-despachos \
            backend-despachos=$BACK_DESPACHOS_IMAGE:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      - name: Verificar despliegue
        run: |
          kubectl rollout status deployment/frontend \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m

          kubectl rollout status deployment/backend-ventas \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m

          kubectl rollout status deployment/backend-despachos \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m

      - name: Mostrar estado final del cluster
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }}

          echo "=== Services ==="
          kubectl get svc -n ${{ env.NAMESPACE }}

          echo "=== Deployments ==="
          kubectl get deployments -n ${{ env.NAMESPACE }}

          echo "=== HPA ==="
          kubectl get hpa -n ${{ env.NAMESPACE }}

          echo "=== Metrics Server ==="
          kubectl get deployment metrics-server -n kube-system

          echo "=== URL publica Frontend ==="
          kubectl get svc frontend-service -n ${{ env.NAMESPACE }}