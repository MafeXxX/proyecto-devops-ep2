name: CI proyecto-devops-ep3

on:
  pull_request:
    branches:
      - feature/develop
      - deploy
      - main

  push:
    branches:
      - feature/develop

  workflow_dispatch:

# El workflow solo necesita leer el contenido del repositorio.
permissions:
  contents: read

jobs:

  # ============================================================
  # 1. PRUEBAS AUTOMATIZADAS DE LOS BACKENDS
  # ============================================================
  backend-tests:
    name: Pruebas - ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend Ventas
            path: back-Ventas_SpringBoot/Springboot-API-REST

          - name: Backend Despachos
            path: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

    # MySQL temporal utilizado solamente durante las pruebas del CI.
    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: despachosdb
          MYSQL_USER: admin
          MYSQL_PASSWORD: admin123

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ${{ matrix.path }}/pom.xml

      - name: Mostrar versión de Java y Maven
        run: |
          java -version
          mvn -version

      - name: Ejecutar pruebas del backend
        working-directory: ${{ matrix.path }}
        env:
          DB_ENDPOINT: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: despachosdb
          DB_USERNAME: admin
          DB_PASSWORD: admin123

          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/despachosdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin123
        run: |
          mvn -B clean test

  # ============================================================
  # 2. VALIDACIÓN DEL FRONTEND
  # ============================================================
  frontend-validation:
    name: Validar Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Instalar dependencias
        working-directory: front_despacho
        run: |
          npm ci

      - name: Ejecutar lint
        working-directory: front_despacho
        run: |
          npm run lint

      - name: Compilar frontend
        working-directory: front_despacho
        run: |
          npm run build

  # ============================================================
  # 3. VALIDACIÓN DE TERRAFORM
  # ============================================================
  terraform-validate:
    name: Validar Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: |
          terraform validate

  # ============================================================
  # 4. VALIDACIÓN DE MANIFIESTOS KUBERNETES
  # ============================================================
  k8s-validate:
    name: Validar manifiestos Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Validar sintaxis YAML Kubernetes
        run: |
          yamllint \
            -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}" \
            infra/k8s/

  # ============================================================
  # 5. CONSTRUCCIÓN DE IMÁGENES DOCKER
  # ============================================================
  ci-build:
    name: Validar builds Docker
    runs-on: ubuntu-latest

    # Docker solamente se ejecutará si todas las validaciones anteriores
    # terminaron correctamente.
    needs:
      - backend-tests
      - frontend-validation
      - terraform-validate
      - k8s-validate

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          docker build \
            --platform linux/amd64 \
            -t proyecto-devops-frontend:ci \
            ./front_despacho

      - name: Build Backend Ventas
        run: |
          docker build \
            --platform linux/amd64 \
            -t proyecto-devops-backend-ventas:ci \
            ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Build Backend Despachos
        run: |
          docker build \
            --platform linux/amd64 \
            -t proyecto-devops-backend-despachos:ci \
            ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Mostrar imágenes construidas
        run: |
          docker images