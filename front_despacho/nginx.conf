server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend React/Vite
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend Ventas dentro de Kubernetes
    location ^~ /api/v1/ventas {
        proxy_pass http://backend-ventas-service:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend Despachos dentro de Kubernetes
    location ^~ /api/v1/despachos {
        proxy_pass http://backend-despachos-service:8081;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}